# Coturn TURN server configuration
# Secure configuration for WebRTC calls

# Listening ports
listening-port=3478
tls-listening-port=5349
alt-listening-port=3479
alt-tls-listening-port=5350

# Listening IP (0.0.0.0 for all interfaces)
listening-ip=0.0.0.0

# Relay IP (set to your server's public IP)
# relay-ip=YOUR_PUBLIC_IP

# External IP (if behind NAT, set to public IP)
# external-ip=YOUR_PUBLIC_IP

# Realm for authentication
realm=4messenger.local

# Server name
server-name=4messenger-turn

# Authentication mechanism
lt-cred-mech
use-auth-secret

# Static auth secret (generate a secure random secret)
static-auth-secret=CHANGE_THIS_TO_A_SECURE_RANDOM_SECRET

# TLS certificates (generate self-signed or use proper certs)
cert=/workspaces/4messenger-privaterepo/server/turn/certs/turnserver.crt
pkey=/workspaces/4messenger-privaterepo/server/turn/certs/turnserver.key

# Log file
log-file=/workspaces/4messenger-privaterepo/server/turn/turnserver.log

# Verbose logging (set to 0 for production)
verbose

# No CLI (run as daemon)
no-cli

# User and group (uncomment if needed)
# user=turnserver
# group=turnserver

# Additional security options
no-multicast-peers
no-stdout-log
syslog